    <style>
      .lessons-head { text-align: center; max-width: 640px; margin: 16px auto 18px; }
      .lessons-head h1 { font-size: var(--fs-2xl); margin: 0 0 4px; }
      .lessons-head p { color: var(--muted); margin: 2px 0; }
      .lessons-note { font-size: var(--fs-sm); }
      .lessons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 14px;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 6px 40px;
      }
      .lesson-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, color-mix(in srgb, var(--gold) 5%, var(--panel)), var(--panel) 60%);
        padding: 18px 20px;
      }
      .lesson-card.locked { opacity: 0.6; text-align: center; padding: 26px 20px; }
      .lesson-lock { font-size: 1.4rem; margin-bottom: 8px; }
      .lesson-locked-note { color: var(--muted); font-size: var(--fs-xs); }
      .lesson-glyph {
        font-family: "Uthmanic Hafs", "Amiri Quran", serif;
        font-size: 1.9rem; color: var(--gold); text-align: center; margin-bottom: 6px; line-height: 1.6;
      }
      .lesson-title { font-weight: 700; font-size: var(--fs-lg); text-align: center; margin-bottom: 8px; }
      .lesson-gist { color: var(--text); font-size: var(--fs-sm); line-height: 1.6; margin: 0 0 14px; }
      .lesson-ex-list { display: grid; gap: 8px; }
      .lesson-ex {
        display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
        padding: 8px 12px; border-radius: var(--radius-md);
        background: color-mix(in srgb, var(--accent) 6%, transparent);
      }
      .lesson-ex-ar { font-family: "Uthmanic Hafs", "Amiri Quran", serif; font-size: 1.5rem; color: var(--text); }
      .lesson-ex-en { color: var(--muted); font-size: var(--fs-sm); text-align: right; }
      body.lang-ur { direction: rtl; }
      body.lang-ur .lesson-gist[lang="ur"], body.lang-ur .lessons-head [lang="ur"],
      body.lang-ur .lesson-ex-en[lang="ur"] {
        font-family: "Noto Nastaliq Urdu", "Amiri Quran", serif; line-height: 1.9;
      }
    </style>
  </head>
