    <style>
      /* Follow-mode specifics: a big calm reading line, a floating flag hand. */
      .follow-ayah .follow-line {
        font-size: clamp(1.9rem, 6vw, 2.8rem);
        line-height: 2.1;
        padding: 18px 6px 10px;
      }
      .follow-word { cursor: pointer; transition: color 160ms ease, opacity 160ms ease; }
      .follow-word.is-active-word { color: var(--accent, #e3b75f); }
      .follow-word.follow-flagged {
        color: #d88a3f;
        text-decoration: underline dotted;
        text-underline-offset: 8px;
      }
      .follow-gloss {
        min-height: 1.6em;
        text-align: center;
        color: var(--muted, #a89a87);
        font-size: 1.05rem;
        margin: 6px 0 14px;
      }
      .follow-controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        padding-bottom: 8px;
      }
      .follow-flag { font-size: 1.05rem; padding: 14px 22px; }
      .follow-intro, .follow-summary { text-align: center; }
    </style>
