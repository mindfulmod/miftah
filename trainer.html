<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Miftah — Quranic Arabic Trainer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill-rule='evenodd' fill='%23e3b75f' d='M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <a href="index.html" class="brand-key" aria-label="Miftah home" title="Miftah — home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill-rule="evenodd" fill="currentColor" d="M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z"></path>
            </svg>
          </a>
          <div>
            <h1 id="surah-title">Quranic Arabic Trainer</h1>
            <p id="surah-subtitle" class="subtitle"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <a href="index.html" class="ghost-btn">≡ All surahs</a>
          <button id="reset-progress" class="ghost-btn" type="button">
            Reset progress
          </button>
        </div>
      </div>
      <div class="progress">
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-label" class="progress-label"></span>
        <span id="perfect-label" class="perfect-label" hidden></span>
        <div id="session-ring" class="session-ring" title="Today's session">
          <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
            <circle class="ring-bg" cx="22" cy="22" r="19"></circle>
            <circle class="ring-fill" id="ring-fill" cx="22" cy="22" r="19"></circle>
          </svg>
          <span id="ring-label" class="ring-label">0/5</span>
        </div>
      </div>
    </header>

    <main id="app" class="app">
      <p id="loading" class="loading">Loading verified Quran data…</p>
    </main>

    <template id="ayah-template">
      <section class="ayah">
        <div class="ayah-head">
          <span class="ayah-num"></span>
          <span class="ayah-status"></span>
          <span class="mistake-meter"></span>
        </div>
        <div class="words" dir="rtl"></div>
        <div class="ayah-reveal" hidden>
          <span class="reveal-badge"></span>
          <p class="reveal-literal"></p>
          <p class="reveal-translation"></p>
        </div>
        <p class="ayah-message"></p>
      </section>
    </template>

    <template id="word-template">
      <div class="word">
        <div class="arabic"></div>
        <div class="dd" dir="ltr">
          <button class="dd-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="dd-label"></span>
            <span class="dd-caret" aria-hidden="true">▾</span>
          </button>
          <div class="dd-menu" role="listbox" hidden></div>
        </div>
      </div>
    </template>

    <footer class="footer">
      <span id="sources"></span>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
