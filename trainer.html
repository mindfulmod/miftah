              <g transform="rotate(45 48 48)">
                <circle cx="35" cy="43" r="13" fill="currentColor"></circle>
                <circle cx="35" cy="43" r="5.2" fill="var(--accent-soft)"></circle>

          <div>
            <h1 id="surah-title">Quranic Arabic Trainer</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <a href="navigator.html" class="ghost-btn gold" title="The Star Navigator — sail the night sea and chart constellations with the words you know"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M12 6.5 14.2 12 12 17.5 9.8 12Z"/></svg>Star Navigator</a>
          <a href="forge.html" class="ghost-btn gold" title="Memory Forge — battle the Forgetting with the words you've learned"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.5c1 3.4 4.5 5 4.5 8.8a4.5 4.5 0 0 1-9 0c0-1.9.9-3.4 2.2-4.7.2 1.1.7 1.9 1.5 2.5-.2-2.3 0-4.4.8-6.6Z"/></svg>Memory Forge</a>
          <a href="letters.html" class="ghost-btn gold" title="Letter Garden — the kids' letters game, no reading needed"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20.5v-7"/><path d="M12 13.5C12 10.2 9.4 7.8 5.5 7.8c0 4 2.6 5.7 6.5 5.7Z"/><path d="M12 13.5c0-2.9 2.2-5 5.7-5 0 3.5-2.2 5-5.7 5Z"/></svg>Letter Garden</a>
          <a href="surahs.html" class="ghost-btn"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M4.5 7h15"/><path d="M4.5 12h15"/><path d="M4.5 17h9"/></svg>All surahs</a>
        </div>
      </div>
      <div class="progress">
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-label" class="progress-label"></span>
        <span id="perfect-label" class="perfect-label" hidden></span>
        <button id="recite-toggle" class="recite-toggle" type="button" aria-pressed="true" title="Recitation audio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4.5 9.5v5H8l4.5 4V5.5L8 9.5Z"/>
            <path class="rt-waves" d="M15.5 9.5a3.6 3.6 0 0 1 0 5"/>
            <path class="rt-waves" d="M18 7.2a7 7 0 0 1 0 9.6"/>
            <path class="rt-slash" d="M4.5 19.5 19.5 4.5"/>
          </svg>
        </button>
        <div id="session-ring" class="session-ring" title="Today's session">
          <svg viewBox="0 0 44 44" width="44" height="44" aria-hidden="true">
            <circle class="ring-bg" cx="22" cy="22" r="19"></circle>
            <circle class="ring-fill" id="ring-fill" cx="22" cy="22" r="19"></circle>
          </svg>
          <span id="ring-label" class="ring-label">0/5</span>
        </div>
      </div>
    </header>

    <main id="app" class="app">
      <!-- Skeleton mirrors the active-ayah layout (head row, read line, play
           card, 2×2 options) so nothing shifts when the real data lands.
           app.js swaps this container's content for the error message on
           failure and removes it on success. -->
      <div id="loading" class="loading" role="status">
        <span class="loading-text">Loading verified Quran data…</span>
        <div class="skeleton-ayah" aria-hidden="true">
          <div class="sk-head">
            <span class="sk sk-pill"></span>
            <span class="sk sk-line"></span>
          </div>
          <span class="sk sk-read"></span>
          <span class="sk sk-word"></span>
          <div class="sk-opts">
            <span class="sk sk-opt"></span>
            <span class="sk sk-opt"></span>
            <span class="sk sk-opt"></span>
            <span class="sk sk-opt"></span>
          </div>
        </div>
      </div>
    </main>

    <template id="ayah-template">
      <section class="ayah">
        <div class="ayah-head">
          <span class="ayah-num"></span>
          <span class="ayah-status"></span>
          <span class="mistake-meter"></span>
        </div>
        <div class="words" dir="rtl"></div>
        <div class="ayah-reveal" hidden>
          <span class="reveal-badge"></span>
          <p class="reveal-literal"></p>
          <p class="reveal-translation"></p>
        </div>
        <p class="ayah-message"></p>
      </section>
    </template>

    <template id="word-template">
      <div class="word">
        <div class="arabic"></div>
        <div class="dd" dir="ltr">
          <button class="dd-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="dd-label"></span>
            <span class="dd-caret" aria-hidden="true">▾</span>
          </button>
          <div class="dd-menu" role="listbox" hidden></div>
        </div>
      </div>
    </template>

    <footer class="footer">
      <span id="sources"></span>
      <button id="reset-progress" class="footer-reset" type="button">Reset progress</button>
    </footer>


    <nav class="tabbar" aria-label="Primary">
      <div class="tabbar-inner">
        <a href="surahs.html" class="tab" data-tab="surahs"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M4.5 7h15"/><path d="M4.5 12h15"/><path d="M4.5 17h9"/></svg><span>Surahs</span></a>
        <a href="trainer.html" class="tab tab-primary" id="tab-continue" data-tab="trainer"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M10 8.5 15.5 12 10 15.5Z"/></svg><span>Continue</span></a>
        <a href="glossary.html" class="tab" data-tab="glossary"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.3C10 4.9 7.2 4.5 4.5 5v13c2.7-.5 5.5 0 7.5 1.5 2-1.5 4.8-2 7.5-1.5V5c-2.7-.5-5.5-.1-7.5 1.3Z"/><path d="M12 6.3v13.2"/></svg><span>Glossary</span></a>
        <button type="button" class="tab" id="tab-games" aria-expanded="false" aria-controls="games-sheet"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6.5" y="6.5" width="11" height="11"/><path d="M12 4.2 19.8 12 12 19.8 4.2 12Z"/></svg><span>Games</span></button>
      </div>
    </nav>

      <a href="navigator.html"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M12 6.5 14.2 12 12 17.5 9.8 12Z"/></svg>Star Navigator</a>
      <a href="forge.html"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.5c1 3.4 4.5 5 4.5 8.8a4.5 4.5 0 0 1-9 0c0-1.9.9-3.4 2.2-4.7.2 1.1.7 1.9 1.5 2.5-.2-2.3 0-4.4.8-6.6Z"/></svg>Memory Forge</a>
      <a href="letters.html"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20.5v-7"/><path d="M12 13.5C12 10.2 9.4 7.8 5.5 7.8c0 4 2.6 5.7 6.5 5.7Z"/><path d="M12 13.5c0-2.9 2.2-5 5.7-5 0 3.5-2.2 5-5.7 5Z"/></svg>Letter Garden</a>
      <a href="index.html"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.5 21c0-5.5-.7-9.3-2.4-12.3"/><path d="M10 8.7C8.6 5.9 6.2 4.8 3.7 5.7c1.7 2 3.8 2.9 6.3 3Z"/><path d="M10 8.7c-.4-3 1.3-5.4 4.3-5.9.4 3-1.3 5.2-4.3 5.9Z"/><path d="M10 8.7c3-1.1 5.9-.4 7.9 1.9-2.9.9-5.9.2-7.9-1.9Z"/><path d="M5.5 21h13"/></svg>Island</a>
    </div>

    <script src="app.js?v=20260717-fable1"></script>

</html>
