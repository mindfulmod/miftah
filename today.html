    <style>
      /* Today-screen specifics; everything else rides the manuscript system. */
      .today-hero { text-align: center; max-width: 480px; margin: 18px auto 0; }
      .today-salam { color: var(--muted); font-size: var(--fs-md); margin: 4px 0 14px; }
      .today-streak {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: var(--fs-lg);
        opacity: 0.55;
      }
      .today-streak.lit { opacity: 1; color: var(--gold); }
      .today-flame { font-size: 1.3em; }
      .today-session-line { font-size: var(--fs-lg); margin: 18px 0 6px; }
      .today-begin { font-size: var(--fs-lg); padding: 14px 34px; text-decoration: none; }
      .today-coverage { color: var(--muted); font-size: var(--fs-sm); min-height: 1.4em; margin-top: 18px; }
      .today-links {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        max-width: 480px;
        margin: 22px auto 0;
      }
      .today-links .ghost-btn { justify-content: center; text-align: center; text-decoration: none; }
      /* wizard */
      .wizard-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
      .wizard-dots i { width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
      .wizard-dots i.on { background: var(--gold); }
      .wizard-dots i.done { background: var(--accent); }
      .wizard-col { flex-direction: column; align-items: stretch; max-width: 340px; margin-inline: auto; }
      .wizard-pace { display: flex; flex-direction: column; gap: 3px; padding: 13px 16px; }
      .wizard-pace b { font-size: var(--fs-lg); }
      .wizard-pace span { color: var(--muted); font-size: var(--fs-xs); }
      /* Urdu mode: RTL + bundled Noto Nastaliq Urdu (vendor/fonts). */
      body.lang-ur { direction: rtl; }
      body.lang-ur .today-hero,
      body.lang-ur .today-links,
      body.lang-ur [lang="ur"] {
        font-family: "Noto Nastaliq Urdu", "Amiri Quran", serif;
        line-height: 1.9;
      }
    </style>
