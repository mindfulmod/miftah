    <style>
      .hm-head { text-align: center; max-width: 640px; margin: 16px auto 18px; }
      .hm-head h1 { font-size: var(--fs-2xl); margin: 0 0 4px; }
      .hm-head p { color: var(--muted); margin: 2px 0; }
      .hm-legend { font-size: var(--fs-sm); }
      .hm-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 8px;
        max-width: 760px;
        margin: 0 auto;
        padding: 0 4px 40px;
      }
      .hm-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 62px;
        padding: 7px 9px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--text);
        overflow: hidden;
        background:
          radial-gradient(120% 140% at 100% 0%, color-mix(in srgb, var(--gold) calc(var(--strong) * 55%), transparent), transparent 60%),
          color-mix(in srgb, var(--accent) calc(var(--fill) * 100%), var(--panel));
        transition: transform 0.12s var(--ease-out), border-color 0.16s ease;
      }
      .hm-cell.begun { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
      .hm-cell.done { border-color: color-mix(in srgb, var(--gold) 55%, var(--line)); }
      .hm-cell:active { transform: scale(0.97); }
      @media (hover: hover) { .hm-cell:hover { transform: translateY(-2px); } }
      .hm-num { font-size: var(--fs-2xs); color: var(--muted); font-weight: 600; }
      .hm-name { font-size: var(--fs-xs); font-weight: 600; line-height: 1.25; }
      body.lang-ur .hm-name { font-family: "Noto Nastaliq Urdu", "Amiri Quran", serif; line-height: 1.8; }
      body.lang-ur .hm-head h1[lang="ur"], body.lang-ur .hm-head p[lang="ur"] {
        font-family: "Noto Nastaliq Urdu", "Amiri Quran", serif; line-height: 1.9;
      }
    </style>
  </head>
