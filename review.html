<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Review Missed Words — Miftah</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="review.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <a href="surahs.html" class="brand-key" aria-label="Miftah home" title="Miftah — home">
            <svg viewBox="0 0 96 96" aria-hidden="true">
              <path d="M24 76V43C24 30 38 25 48 14c10 11 24 16 24 29v33" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"></path>
              <g transform="rotate(45 48 48)">
                <circle cx="35" cy="43" r="13" fill="currentColor"></circle>
                <circle cx="35" cy="43" r="5.2" fill="var(--accent-soft)"></circle>
                <rect x="45" y="39" width="28" height="8.5" rx="3.5" fill="currentColor"></rect>
                <path d="M63 43h12v7h-5v6h-8v-9h1Z" fill="currentColor"></path>
              </g>
            </svg>
          </a>
          <div>
            <h1>Review · Missed Words</h1>
            <p id="deck-subtitle" class="subtitle"></p>
          </div>
        </div>
        <div class="proto-controls">
          <a id="trainer-link" href="surahs.html" class="ghost-btn">← Trainer</a>
          <a href="surahs.html" class="ghost-btn">≡ All surahs</a>
          <button id="sim-day" class="ghost-btn" type="button">⏩ Simulate +1 day</button>
          <button id="reset-deck" class="ghost-btn" type="button">Reset deck</button>
        </div>
      </div>
    </header>

    <main class="app">
      <p id="loading" class="loading">Loading…</p>

      <section id="review-area" class="review-area" hidden></section>

      <section id="board" class="board" hidden>
        <h2 class="board-title">Memory strength</h2>
        <div id="board-list" class="board-list"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Spaced-repetition review of the words you missed in the trainer, scheduled with FSRS. Each word you recall has its memory strength raised and returns later; a miss weakens it and brings it back sooner.</span>
    </footer>

    <script src="fsrs.js"></script>
    <script src="review.js?v=20260629-beginner-options"></script>
  </body>
</html>
