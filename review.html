<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Review Missed Words — Miftah</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill-rule='evenodd' fill='%23e3b75f' d='M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="review.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <a href="index.html" class="brand-key" aria-label="Miftah home" title="Miftah — home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill-rule="evenodd" fill="currentColor" d="M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z"></path>
            </svg>
          </a>
          <div>
            <h1>Review · Missed Words</h1>
            <p id="deck-subtitle" class="subtitle"></p>
          </div>
        </div>
        <div class="proto-controls">
          <a id="trainer-link" href="index.html" class="ghost-btn">← Trainer</a>
          <a href="index.html" class="ghost-btn">≡ All surahs</a>
          <button id="sim-day" class="ghost-btn" type="button">⏩ Simulate +1 day</button>
          <button id="reset-deck" class="ghost-btn" type="button">Reset deck</button>
        </div>
      </div>
    </header>

    <main class="app">
      <p id="loading" class="loading">Loading…</p>

      <section id="review-area" class="review-area" hidden></section>

      <section id="board" class="board" hidden>
        <h2 class="board-title">Memory strength</h2>
        <div id="board-list" class="board-list"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Spaced-repetition review of the words you missed in the trainer. Words you recall move up the boxes and return less often; words you miss drop down and come back sooner.</span>
    </footer>

    <script src="review.js"></script>
  </body>
</html>
