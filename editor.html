<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miftah Island — Map Editor (dev only)</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        display: grid;
        grid-template-columns: 260px 1fr 260px;
        height: 100vh;
        background: #1c130c;
        color: #f4e6c8;
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      header {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px;
        background: #2a1c11;
        border-bottom: 3px solid #7b4a21;
      }
      header h1 { font-size: 14px; margin: 0; color: #ffd879; }
      header .status { font-size: 11px; color: #cbb489; }
      #save-btn {
        border: 2px solid #3b2111;
        border-radius: 6px;
        background: linear-gradient(180deg, #fff1a8, #d79b36);
        color: #2c1a11;
        font: 900 12px/1 ui-monospace, monospace;
        padding: 8px 14px;
        cursor: pointer;
      }
      #save-btn:active { filter: brightness(0.92); }
      #palette, #inspector {
        overflow-y: auto;
        padding: 10px;
        background: #201509;
        border-right: 2px solid #3b2510;
      }
      #inspector { border-right: none; border-left: 2px solid #3b2510; }
      #palette h2, #inspector h2 {
        font-size: 11px;
        text-transform: uppercase;
        color: #ffd879;
        margin: 12px 0 6px;
        border-bottom: 1px solid #4a3018;
        padding-bottom: 4px;
      }
      #palette h2:first-child { margin-top: 0; }
      .palette-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        border: 2px solid #4a3018;
        border-radius: 6px;
        background: #2a1c11;
        color: #f4e6c8;
        padding: 6px 8px;
        margin-bottom: 6px;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }
      .palette-item img { width: 28px; height: 28px; object-fit: contain; image-rendering: pixelated; }
      .palette-item .dims { margin-left: auto; color: #a68a5f; font-size: 10px; }
      .palette-item.is-selected {
        border-color: #f4bb3a;
        background: #3a2712;
      }
      #canvas-wrap { position: relative; overflow: hidden; }
      canvas { display: block; background: #0c1c22; cursor: crosshair; }
      #hint {
        position: absolute;
        left: 10px;
        bottom: 10px;
        max-width: calc(100% - 20px);
        background: rgba(20, 12, 6, 0.82);
        border: 2px solid #7b4a21;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        color: #ffe7a2;
      }
      .placed-row {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #4a3018;
        border-radius: 5px;
        padding: 4px 6px;
        margin-bottom: 5px;
        font-size: 10px;
      }
      .placed-row span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .placed-row button {
        border: 1px solid #7a2a1e;
        background: #4a1f14;
        color: #ffcaba;
        border-radius: 4px;
        font: 900 9px/1 monospace;
        padding: 3px 6px;
        cursor: pointer;
      }
      #empty-note { color: #a68a5f; font-size: 10px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Miftah Map Editor <span class="status" id="mode-status"></span></h1>
      <div class="status" id="save-status"></div>
      <button id="save-btn" type="button">Save to mapOverrides.json</button>
    </header>

    <aside id="palette"></aside>

    <div id="canvas-wrap">
      <canvas id="editor-canvas"></canvas>
      <div id="hint">Arrow keys / drag with middle mouse to pan. Click a palette item to place it, or deselect and click any dashed prop to move it. Esc cancels.</div>
    </div>

    <aside id="inspector">
      <h2>Map props</h2>
      <div id="placed-list"><p id="empty-note">No editable props.</p></div>
    </aside>

    <script src="src/data/assets.js"></script>
    <script src="src/core/AssetLoader.js"></script>
    <script src="src/core/Camera.js"></script>
    <script src="src/world/MapData.js"></script>
    <script src="src/world/TileMap.js"></script>
    <script src="src/world/WorldMap.js"></script>
    <script src="src/core/CollisionMap.js"></script>
    <script src="src/editor/editorCatalog.js"></script>
    <script src="src/editor/editor.js"></script>
  </body>
</html>
