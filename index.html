<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Miftah — Quranic Arabic Trainer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill-rule='evenodd' fill='%23e3b75f' d='M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <a href="index.html" class="brand-key" aria-label="Miftah home" title="Miftah — home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill-rule="evenodd" fill="currentColor" d="M8 2.4a5.6 5.6 0 0 0-1 11.1V19a1 1 0 0 0 .29.71l1 1a1 1 0 0 0 1.42 0l1.6-1.6-1.3-1.3 1.3-1.3-1.3-1.3.99-.99A5.6 5.6 0 0 0 8 2.4ZM8 6.1a1.9 1.9 0 1 0 0 3.8 1.9 1.9 0 1 0 0-3.8Z"></path>
            </svg>
          </a>
          <div>
            <h1>Miftah</h1>
            <p class="subtitle">Quranic Arabic Trainer — Choose a surah, finish one to unlock the next.</p>
          </div>
        </div>
        <div class="topbar-actions">
          <a href="glossary.html" class="ghost-btn gold">📖 Glossary</a>
        </div>
      </div>
    </header>

    <main class="app">
      <section id="home-hero" class="home-hero" hidden></section>
      <p id="loading" class="loading">Loading surahs…</p>
      <h2 id="surah-list-heading" class="section-heading" hidden>Surahs</h2>
      <div id="surah-list" class="surah-list"></div>
    </main>

    <template id="surah-card-template">
      <a class="surah-card">
        <div class="surah-card-num"></div>
        <div class="surah-card-body">
          <div class="surah-card-names">
            <span class="surah-card-en"></span>
            <span class="surah-card-ar"></span>
          </div>
          <div class="surah-card-meta"></div>
          <div class="surah-card-track"><div class="surah-card-fill"></div></div>
        </div>
        <div class="surah-card-actions"></div>
      </a>
    </template>

    <footer class="footer">
      <span id="sources"></span>
    </footer>

    <script src="picker.js"></script>
  </body>
</html>
