<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Glossary — Miftah</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="glossary.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-lockup">
          <a href="index.html" class="brand-key" aria-label="Miftah home" title="Miftah — home">
            <svg viewBox="0 0 96 96" aria-hidden="true">
              <path d="M24 76V43C24 30 38 25 48 14c10 11 24 16 24 29v33" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"></path>
              <g transform="rotate(45 48 48)">
                <circle cx="35" cy="43" r="13" fill="currentColor"></circle>
                <circle cx="35" cy="43" r="5.2" fill="var(--accent-soft)"></circle>
                <rect x="45" y="39" width="28" height="8.5" rx="3.5" fill="currentColor"></rect>
                <path d="M63 43h12v7h-5v6h-8v-9h1Z" fill="currentColor"></path>
              </g>
            </svg>
          </a>
          <div>
            <h1>Glossary</h1>
            <p id="gloss-subtitle" class="subtitle">The words you've learned so far.</p>
          </div>
        </div>
        <div class="topbar-actions">
          <a href="index.html" class="ghost-btn">≡ All surahs</a>
        </div>
      </div>
    </header>

    <main class="app">
      <p id="loading" class="loading">Loading your glossary…</p>

      <!-- Glossary list view -->
      <section id="gloss-view" class="gloss-view" hidden>
        <div class="gloss-toolbar">
          <input
            id="gloss-search"
            class="gloss-search"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="Search Arabic or meaning…"
            aria-label="Search the glossary"
          />
          <button id="start-test" class="primary-btn" type="button">
            🎯 Run 10-word test
          </button>
        </div>
        <div id="gloss-groups" class="gloss-groups"></div>
        <p id="gloss-empty" class="gloss-empty" hidden></p>
      </section>

      <!-- Test view -->
      <section id="test-view" class="test-view" hidden>
        <div class="quiz-head">
          <button id="quit-test" class="ghost-btn" type="button">← Back to glossary</button>
          <div class="quiz-track"><div id="quiz-fill" class="quiz-fill"></div></div>
          <span id="quiz-count" class="quiz-count">1 / 10</span>
        </div>
        <div id="quiz-card" class="quiz-card"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Your glossary grows as you complete ayahs in the trainer. The 10-word test draws at random from everything you've learned — a quick way to keep it fresh.</span>
    </footer>

    <script src="glossary.js?v=20260629-beginner-options"></script>
  </body>
</html>
