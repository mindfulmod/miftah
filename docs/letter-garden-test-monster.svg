    <g id="feet">
      <ellipse cx="-61" cy="195" rx="46" ry="25" fill="#7657ff" stroke="#111018" stroke-width="13"/>
      <ellipse cx="61" cy="195" rx="46" ry="25" fill="#7657ff" stroke="#111018" stroke-width="13"/>
    </g>
