      <path d="M220 610 C238 596 278 601 289 620 C285 641 266 647 245 643 C227 640 217 628 220 610 Z" fill="url(#cream-gradient)"/>
      <path d="M351 620 C362 601 402 596 420 610 C423 628 413 640 395 643 C374 647 355 641 351 620 Z" fill="url(#cream-gradient)"/>
