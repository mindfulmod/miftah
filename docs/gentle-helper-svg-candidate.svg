      <path d="M281 414 Q320 390 359 414" fill="none" stroke="#fff8e8" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
      <path d="M219 419 Q242 450 235 510" fill="none" stroke="var(--body-dark)" stroke-width="6" stroke-linecap="round" opacity="0.62"/>
      <path d="M421 419 Q398 450 405 510" fill="none" stroke="var(--body-dark)" stroke-width="6" stroke-linecap="round" opacity="0.62"/>
      <ellipse cx="245" cy="514" rx="26" ry="23" fill="url(#cream-gradient)"/>
      <ellipse cx="395" cy="514" rx="26" ry="23" fill="url(#cream-gradient)"/>
      <path d="M232 513 H258 M382 513 H408" fill="none" stroke="var(--cream-dark)" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="feet">
      <path d="M199 596 C223 575 285 578 309 605 C310 639 284 655 248 655 C214 655 193 637 199 596 Z"
