      <ellipse cx="382" cy="225" rx="37" ry="49" fill="#fffdf8"/>
      <ellipse cx="265" cy="233" rx="15" ry="24" fill="var(--ink)"/>
      <ellipse cx="375" cy="233" rx="15" ry="24" fill="var(--ink)"/>
      <circle cx="271" cy="222" r="5.5" fill="#fff"/>
      <circle cx="369" cy="222" r="5.5" fill="#fff"/>
      <path d="M282 198 Q258 181 235 201 M358 198 Q382 181 405 201"
        fill="none" stroke="var(--body-dark)" stroke-width="7" stroke-linecap="round"/>

      <path d="M222 280 C240 250 274 244 299 261 C309 268 316 278 320 288 C324 278 331 268 341 261 C366 244 400 250 418 280 C436 312 419 354 387 364 C362 372 339 356 320 338 C301 356 278 372 253 364 C221 354 204 312 222 280 Z"
