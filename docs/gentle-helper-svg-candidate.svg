<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 700" role="img" aria-labelledby="title desc"
  style="--body:#55abc5;--body-light:#79c4d4;--body-dark:#31768e;--cream:#f3e2b5;--cream-dark:#d5b976;--ink:#27364f;--blush:#d98282">
  <title id="title">Gentle Cat Helper SVG candidate</title>
  <desc id="desc">A cohesive color-changing cat designed as a gentle learning companion.</desc>
  <defs>
    <linearGradient id="body-gradient" x1="0.18" y1="0.08" x2="0.82" y2="0.95">
      <stop offset="0" stop-color="var(--body-light)"/>
      <stop offset="1" stop-color="var(--body)"/>
    </linearGradient>
    <linearGradient id="cream-gradient" x1="0.25" y1="0.08" x2="0.75" y2="1">
      <stop offset="0" stop-color="#fff3d4"/>
      <stop offset="1" stop-color="var(--cream)"/>
    </linearGradient>
    <filter id="ground-blur" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <g id="gentle-cat">
    <ellipse cx="320" cy="650" rx="162" ry="18" fill="var(--ink)" opacity="0.15" filter="url(#ground-blur)"/>

    <g id="back-slot">
      <path d="M422 522 C512 522 550 462 520 421 C493 385 446 399 445 437 C444 467 473 480 495 460"
        fill="none" stroke="var(--ink)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="tail" d="M422 522 C512 522 550 462 520 421 C493 385 446 399 445 437 C444 467 473 480 495 460"
        fill="none" stroke="url(#body-gradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M493 406 Q520 419 521 448" fill="none" stroke="var(--body-light)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    </g>

    <g id="body-silhouette">
      <path d="M187 165 L184 67 L252 107 C273 97 296 92 320 92 C344 92 367 97 388 107 L456 67 L453 165 C482 193 495 239 491 282 C487 329 462 359 425 375 C444 410 451 461 446 512 C440 573 416 612 383 627 C363 636 340 635 320 624 C300 635 277 636 257 627 C224 612 200 573 194 512 C189 461 196 410 215 375 C178 359 153 329 149 282 C145 239 158 193 187 165 Z"
        fill="url(#body-gradient)" stroke="var(--ink)" stroke-width="11" stroke-linejoin="round"/>
      <path d="M207 152 L204 91 L246 118 Z" fill="var(--cream-dark)" opacity="0.9"/>
      <path d="M433 152 L436 91 L394 118 Z" fill="var(--cream-dark)" opacity="0.9"/>
      <path d="M204 169 C238 118 278 112 313 112" fill="none" stroke="#a7dae3" stroke-width="15" stroke-linecap="round" opacity="0.62"/>
    </g>

    <g id="base-markings">
