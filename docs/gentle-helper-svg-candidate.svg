      <path d="M298 291 L320 280 L342 291 Q336 310 320 310 Q304 310 298 291 Z"
        fill="var(--blush)" stroke="var(--ink)" stroke-width="6" stroke-linejoin="round"/>
      <path d="M320 309 V319 M320 319 Q301 341 285 323 M320 319 Q339 341 355 323"
        fill="none" stroke="var(--ink)" stroke-width="7" stroke-linecap="round"/>
      <path d="M252 303 L195 292 M253 320 L191 321 M388 303 L445 292 M387 320 L449 321"
        fill="none" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
      <ellipse cx="245" cy="341" rx="16" ry="9" fill="var(--blush)" opacity="0.48"/>
      <ellipse cx="395" cy="341" rx="16" ry="9" fill="var(--blush)" opacity="0.48"/>

      <path d="M283 139 Q290 161 301 143 M320 133 V160 M357 139 Q350 161 339 143"
        fill="none" stroke="var(--body-dark)" stroke-width="7" stroke-linecap="round"/>
    </g>

    <g id="headwear-slot"/>
    <g id="neck-slot"/>
    <g id="outfit-slot"/>
    <g id="hand-slot"/>
  </g>
</svg>
